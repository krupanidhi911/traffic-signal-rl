name: SmartTrafficSignalController-MultiAgent-v1
version: "2.0.0"
description: >
  Multi-Agent Cooperative Traffic Signal Control. Two connected intersections must
  coordinate to prevent arterial gridlock and maximize global throughput.

task: multi-agent-traffic-cooperation
category: real-world-simulation

observation_space:
  type: Dict
  fields:
    agent_0:
      type: Dict
      description: "Observation for West Intersection"
    agent_1:
      type: Dict
      description: "Observation for East Intersection"

action_space:
  type: Dict
  description: Maps agent_id to their chosen green signal (0=N, 1=S, 2=E, 3=W).
  fields:
    agent_0: { type: int, range: [0, 3] }
    agent_1: { type: int, range: [0, 3] }

reward:
  range: [0.0, 1.0]
  description: >
    Strictly bounded global cooperative reward. 
    0.5 base + efficiency bonus - gridlock penalty - starvation penalty.

episode:
  max_steps: 200
  termination: fixed_length

tasks:
  - id: easy
    name: Corridor Flow
    difficulty: easy
    seed: 42
  - id: medium
    name: Arterial Coordination
    difficulty: medium
    seed: 123
  - id: hard
    name: Gridlock Prevention
    difficulty: hard
    seed: 7

endpoints:
  reset: POST /reset
  step:  POST /step
  state: GET  /state

infra:
  runtime_limit_minutes: 20
  memory_gb: 8
  cpu: 2
